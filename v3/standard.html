<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OzoneChain · IA Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/highcharts-more.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
<script src="https://code.highcharts.com/modules/export-data.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>
<script src="https://code.highcharts.com/themes/adaptive.js"></script>
<style>
:root {
  --bg: #0b0f1a;
  --panel-bg: rgba(20,30,50,0.8);
  --panel-border: #2a3a5a;
  --text: #c8d6ff;
  --accent: #00ffff;
  --green: #00ff90;
  --red: #ff4d4d;
  --yellow: #ffd700;
  --font: "Consolas", "Courier New", monospace;
}

body {
  margin:0;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display:flex;
  justify-content:center;
  padding: 20px;
}

.wrapper {
  width: 95%;
  max-width: 1000px;
}

.console {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h2 {
  margin:0;
  font-size:1.6em;
  color: var(--accent);
  /*text-shadow: 0 0 10px var(--accent);*/
}

.status {
  font-size:12px;
  color: var(--green);
  font-weight:bold;
}

.buttons {
  display:flex;
  gap:10px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background: linear-gradient(135deg,#00ffff,#3fa9ff);
  cursor:pointer;
  font-weight:600;
  color:#000;
  font-size:11px;
  /*text-shadow:0 0 2px #000;*/
  transition:0.2s;
}

button:hover {
  background: linear-gradient(135deg,#3fa9ff,#00ffff);
  box-shadow: 0 0 10px #00ffff;
}

.panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
  display: flex;
  flex-direction: column;
  gap:6px;
}

.panel h3 {
  margin:0 0 8px 0;
  color: var(--accent);
  /*text-shadow:0 0 8px var(--accent);*/
  font-size:1.1em;
}

.row {
  display:flex;
  justify-content:space-between;
  font-size:12px;
  padding:2px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.row > div:only-child {
  width: 100%;
  flex: 1;
}

.row table {
  width: 100%;
  border-collapse: collapse;
}

.row:last-child {
  border-bottom:none;
}

.addr {
  display:flex;
  gap:6px;
  align-items:center;
  font-family: monospace;
  color:#00ffff;
}

.copyBtn {
  background:#111;
  color:#fff;
  border:1px solid #333;
  padding:2px 5px;
  border-radius:4px;
  font-size:10px;
  cursor:pointer;
  transition:0.2s;
}

.copyBtn:hover {
  background:#00ffff;
  color:#000;
}

.shortAddr {
  font-weight:bold;
  color: var(--yellow);
}

.section-title {
  font-weight:bold;
  color: var(--green);
  margin-top:8px;
  margin-bottom:4px;
}

/* Loader Overlay */

.loaderOverlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(10,15,25,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner {
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.1);
  border-top:6px solid #00ffff;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform:rotate(0deg); }
  100% { transform:rotate(360deg); }
}

#btnloadRule {
    cursor: pointer;
    display: inline-block;
    padding: 10px 20px;
    border-radius: 8px;
    background: #111;
    color: #fff;
    transition: 0.2s ease;
}

#btnloadRule:hover {
    background: #333;
    transform: scale(1.05);
}

</style>
</head>

<body>
<div class="wrapper">
  <div class="console">
    <div class="header">
      <a id="btnloadRule" onclick="showLoader(); loadRule();"><h2>OzoneChain IA Console</h2></a>
     <div id="walletLine" style="margin-left:auto;font-size:12px;display:flex;gap:10px;align-items:center;">

        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>

        <span id="walletInfoLine" style="display:none;gap:10px;align-items:center;">
            <span id="walletAddr" class="shortAddr"></span>
            <button class="copyBtn" onclick="copyWallet()">📋</button>

            <span id="walletId"></span> |

            <span id="walletInst" class="shortAddr"></span>
            <button id="btnJoin" onclick="showLoader(); joinUser();">Join</button>
            <button id="btnInit" onclick="showLoader(); initUser();">Initialize</button>

            |

            <span id="walletStor" class="shortAddr"></span>
            <button id="btnImport" onclick="showLoader(); importUser();">Import</button>

            <a href="#" onclick="disconnectWallet()" style="color:#ff4d4d;">disconnect</a>
        </span>

    </div>
    </div>

    <div class="buttons">
      <button onclick="showLoader(); loadSystem();">Load System</button>
      <button onclick="showLoader(); loadMarket();">Marketplace</button>
      <!-- User input for address -->
      <input type="text" id="userAddrInput" placeholder="Enter user address 0x....."
       style="padding:6px 10px; border-radius:6px; border:1px solid #555; 
              width:320px; max-width: 80%; font-family:monospace; color:#0b0f1a;" value="0xE77aB47de567b3a79849F38dbAd1d321b3ACE9d8" />
      <button onclick="showLoader(); loadUser();">Load User</button>
      <button onclick="showLoader(); loadID();">Get ID</button>
      <button onclick="showLoader(); loadNFTArchive();">NFT Logs</button>
      <button onclick="showLoader(); loadValidatorPage();">Validator</button>
      <button onclick="showLoader(); loadUpline();">UplineBusiness</button>
      <button onclick="showLoader(); loadDAO();">DAO</button>
    </div>

    <div id="systemPanels">
      <!-- Panels will be injected here -->
    </div>
  </div>
</div>
<div class="loaderOverlay" id="loader">
  <div class="spinner"></div>
</div>
<script>

function showLoader(){
  document.getElementById("loader").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loader").style.display = "none";
}
showLoader();
var version = Date.now();
document.addEventListener("DOMContentLoaded", () => {
    
    function loadScript(src, callback) {
      var script = document.createElement('script');
      script.src = src + '?v=' + version;
      script.onload = callback;
      document.head.appendChild(script);
    }

    loadScript('factory2js/appaddress.js', function () {
      loadScript('factory2js/app.js', function () {
          console.log('All scripts loaded');
      });
    });
});
</script>

</body>
</html>
