```html
<!DOCTYPE html>
<html>
<head>
<title>Validator Income Dashboard</title>

<style>

body{
font-family:Arial;
padding:20px;
}

input{
width:420px;
padding:8px;
}

button{
padding:8px 15px;
cursor:pointer;
}

table{
border-collapse:collapse;
margin-top:20px;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#f2f2f2;
}

.loading{color:blue;margin-top:10px;}
.error{color:red;margin-top:10px;}

.tab{
display:inline-block;
padding:10px 15px;
background:#ddd;
margin-right:5px;
cursor:pointer;
border-radius:4px;
}

.tab.active{
background:#4285f4;
color:white;
}

.tabcontent{
display:none;
margin-top:10px;
}

.tabcontent.active{
display:block;
}

.copybtn{
margin-left:5px;
cursor:pointer;
border:none;
background:none;
font-size:14px;
}

</style>
</head>

<body>

<h2>Validator Income Details</h2>

<input type="text" id="addressInput" placeholder="Enter Node Address (0x...)" />
<button onclick="fetchData()">Fetch Data</button>

<div id="status"></div>

<div id="tabs" style="margin-top:20px;"></div>

<div id="tab1" class="tabcontent"></div>
<div id="tab2" class="tabcontent"></div>
<div id="tab3" class="tabcontent"></div>

<script>

function shortAddr(addr){
if(!addr) return '';
return addr.slice(0,6)+'...'+addr.slice(-4);
}

function copyAddr(addr,btn){

navigator.clipboard.writeText(addr);

btn.innerText="✓";

setTimeout(()=>{
btn.innerText="📋";
},1000);

}

function addrCell(addr){

return `
<span title="${addr}">
${shortAddr(addr)}
<button class="copybtn" onclick="copyAddr('${addr}',this)" title="Copy Address">📋</button>
</span>
`;

}

function showTab(tabId){

document.querySelectorAll('.tabcontent').forEach(t=>{
t.classList.remove('active');
});

document.querySelectorAll('.tab').forEach(t=>{
t.classList.remove('active');
});

document.getElementById(tabId).classList.add('active');
document.getElementById("btn_"+tabId).classList.add('active');

}

async function fetchData(){

const address=document.getElementById("addressInput").value.trim();
const statusDiv=document.getElementById("status");

if(!address){
statusDiv.innerHTML="<div class='error'>Enter address</div>";
return;
}

statusDiv.innerHTML="<div class='loading'>Loading...</div>";

try{

const api1=`https://api.nftwall.io:2096/api/call-proc?procedureName=get_rpt_validator_income_details&node=${address}`;
const api2=`https://api.nftwall.io:2096/api/call-proc?procedureName=get_rpt_validator_income&node=${address}`;

const r1=await fetch(api1);
const d1=await r1.json();

const r2=await fetch(api2);
const d2=await r2.json();

statusDiv.innerHTML="";

document.getElementById("tabs").innerHTML=`
<div class="tab active" id="btn_tab1" onclick="showTab('tab1')">Delegator Details</div>
<div class="tab" id="btn_tab2" onclick="showTab('tab2')">Daily Validator Income</div>
<div class="tab" id="btn_tab3" onclick="showTab('tab3')">Income Transactions</div>
`;

/* TAB 1 */

let records=d1.data[0];

let table1=`<table>
<tr>
<th>Delegator</th>
<th>Validator</th>
<th>Total Share</th>
<th>Extra Share</th>
<th>Diff Share</th>
<th>Value</th>
<th>Qty</th>
<th>StakePer25</th>
<th>Income</th>
<th>Jailed</th>
<th>Active</th>
<th>Allowed</th>
<th>Year</th>
<th>Age</th>
</tr>`;

records.forEach(item=>{
table1+=`
<tr>
<td>${addrCell(item.delegatoraddress0x)}</td>
<td>${addrCell(item.validatoraddress)}</td>
<td>${item.totalshare}</td>
<td>${item.extrashare}</td>
<td>${item.diffShare}</td>
<td>${item.value}</td>
<td>${item.amt}</td>
<td>${item.StakePer25}</td>
<td>${item.income}</td>
<td>${item.jailed}</td>
<td>${item.active}</td>
<td>${item.allowed}</td>
<td>${item.txnYear}</td>
<td>${item.age}</td>
</tr>
`;
});

table1+="</table>";

document.getElementById("tab1").innerHTML=table1;


/* TAB 2 */

let set1=d2.data[0];

let table2=`<table>
<tr>
<th>Node</th>
<th>Income</th>
<th>Date</th>
<th>Record Age</th>
</tr>`;

set1.forEach(item=>{
table2+=`
<tr>
<td>${addrCell(item.node)}</td>
<td>${item.income}</td>
<td>${item.age}</td>
<td>${item.recordAge}</td>
</tr>
`;
});

table2+="</table>";

document.getElementById("tab2").innerHTML=table2;


/* TAB 3 */

let set2=d2.data[1];

let table3=`<table>
<tr>
<th>User</th>
<th>From</th>
<th>Token</th>
<th>Amount</th>
<th>Value</th>
<th>Block</th>
<th>Created</th>
</tr>`;

set2.forEach(item=>{
table3+=`
<tr>
<td>${addrCell(item.uinst)}</td>
<td>${addrCell(item.from)}</td>
<td>${addrCell(item.orc1155)}</td>
<td>${item.amt}</td>
<td>${item.value}</td>
<td>${item.block}</td>
<td>${item.createdAt}</td>
</tr>
`;
});

table3+="</table>";

document.getElementById("tab3").innerHTML=table3;

showTab('tab1');

}
catch(e){

statusDiv.innerHTML="<div class='error'>Error loading API</div>";
console.error(e);

}

}

</script>

</body>
</html>
```
