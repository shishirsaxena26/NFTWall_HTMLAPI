<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Above Rank 5 Users Report</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
}

/* Tabs */
.tabs {
  margin-bottom: 10px;
}

.tab-btn {
  padding: 6px 12px;
  margin-right: 5px;
  border: 1px solid #999;
  background: #f5f5f5;
  cursor: pointer;
}

.tab-btn.active {
  background: #e0e7ff;
  font-weight: bold;
}

/* Tab */
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

/* Table */
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
}

th, td {
  border: 1px solid #d1d5db;
  padding: 6px 8px;
  text-align: right;
}

/* Header */
th {
  background: #f9fafb;
  text-align: center;
  font-weight: 600;
  color: #374151;
}

/* Left align */
td:first-child,
td:nth-child(2) {
  text-align: left;
}

/* Zebra */
tr:nth-child(even) {
  background: #fafafa;
}

/* Hover */
tr:hover {
  background: #f1f5ff;
}

/* -------- VALUE -------- */
.value {
  display: block;
  font-weight: 500; /* less bold */
  font-size: 12px;
  color: #111827;
  margin: 0;
  padding: 0;
}

/* -------- DIFF -------- */
.diff {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 5px;
  font-size: 10px;
  border-radius: 3px;
  font-weight: 400; /* light */
  border: 1px solid;
  margin: 0;
}

/* Arrow */
.arrow {
  width: 0;
  height: 0;
  border-left: 3px solid transparent;
  border-right: 3px solid transparent;
}

/* UP */
.up .arrow {
  border-bottom: 5px solid #16a34a;
}
.diff.up {
  color: #166534;
  background: #f0fdf4;
  border-color: #d1fae5;
}

/* DOWN */
.down .arrow {
  border-top: 5px solid #dc2626;
}
.diff.down {
  color: #991b1b;
  background: #fef2f2;
  border-color: #fee2e2;
}

/* FLAT */
.diff.flat {
  color: #6b7280;
  background: transparent;
  border: none;
}

/* Loading */
.loading {
  padding: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Above Rank 5 Users Report</h2>

<div id="loading" class="loading">Loading report data...</div>

<div id="tabs" class="tabs" style="display:none;"></div>
<div id="tabContents"></div>

<script>
const baseUrl = "https://api.nftwall.io:2096/api/call-proc?procedureName=get_rpt_5Star_user";

let mainData = [];

/* LOAD MAIN */
fetch(baseUrl)
  .then(res => res.json())
  .then(apiResponse => {
    document.getElementById("loading").style.display = "none";

    if (!apiResponse.success || !Array.isArray(apiResponse.data)) return;

    mainData = apiResponse.data[0] || [];

    renderMainTab(mainData);
    createNodeTabs(mainData);
  });

/* MAIN TAB */
function renderMainTab(data) {
  const tabsDiv = document.getElementById("tabs");
  const contentsDiv = document.getElementById("tabContents");

  tabsDiv.style.display = "block";

  const btn = document.createElement("button");
  btn.className = "tab-btn active";
  btn.textContent = "Main";
  btn.onclick = () => activateTab("tab-main");
  tabsDiv.appendChild(btn);

  const content = document.createElement("div");
  content.className = "tab-content active";
  content.id = "tab-main";

  content.appendChild(createTable(data));
  contentsDiv.appendChild(content);
}

/* NODE TABS */
function createNodeTabs(data) {
  const tabsDiv = document.getElementById("tabs");

  const nodes = [...new Set(data.map(x => x.node))];

  nodes.forEach(node => {
    const short = node.slice(0, 6) + "..." + node.slice(-4);

    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = short;

    btn.onclick = () => loadNodeHistory(node, short);

    tabsDiv.appendChild(btn);
  });
}

/* LOAD HISTORY */
function loadNodeHistory(node, label) {
  const tabId = "tab-" + label;
  const contentsDiv = document.getElementById("tabContents");

  let content = document.getElementById(tabId);

  if (!content) {
    content = document.createElement("div");
    content.className = "tab-content";
    content.id = tabId;
    content.innerHTML = "<div class='loading'>Loading...</div>";
    contentsDiv.appendChild(content);
  }

  activateTab(tabId);

  if (content.dataset.loaded) return;

  fetch(baseUrl + `&node=${node}&days=5`)
    .then(res => res.json())
    .then(apiResponse => {
      const data = apiResponse.data[0] || [];
      content.innerHTML = "";
      content.appendChild(createTable(data));
      content.dataset.loaded = "true";
    });
}

/* TABLE */
function createTable(dataset) {
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const tbody = document.createElement("tbody");

  if (!dataset.length) return table;

  const headers = [
    "nodeId","node","My Business","Team Business",
    "MyQty","TeamQty","Directs","TeamCount","Date"
  ];

  const trHead = document.createElement("tr");
  headers.forEach(h => {
    const th = document.createElement("th");
    th.textContent = h;
    trHead.appendChild(th);
  });

  thead.appendChild(trHead);

  dataset.forEach(row => {
    const tr = document.createElement("tr");

    addCell(tr, row.nodeId);
    addCell(tr, shortAddr(row.node));

    tr.appendChild(createTrendCell(row.mybusiness, row.mybusiness_diff));
    tr.appendChild(createTrendCell(row.teambusiness, row.teambusiness_diff));

    tr.appendChild(createTrendCell(row.myQty, row.myQty_diff));
    tr.appendChild(createTrendCell(row.teamQty, row.teamQty_diff));

    tr.appendChild(createTrendCell(row.directs, row.directs_diff));
    tr.appendChild(createTrendCell(row.teamcount, row.teamcount_diff));

    addCell(tr, row.date);

    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  return table;
}

/* HELPERS */
function addCell(tr, value) {
  const td = document.createElement("td");
  td.textContent = value ?? "";
  tr.appendChild(td);
}

function shortAddr(addr) {
  return addr ? addr.slice(0,6)+"..."+addr.slice(-4) : "";
}

/* TREND CELL */
function createTrendCell(value, diff) {
  const td = document.createElement("td");

  const val = Number(value || 0);
  diff = Number(diff ?? 0);

  const valueDiv = document.createElement("div");
  valueDiv.className = "value";
  valueDiv.textContent = val.toLocaleString();

  const diffDiv = document.createElement("div");
  diffDiv.className = "diff";

  if (diff > 0) {
    diffDiv.classList.add("up");

    const arrow = document.createElement("span");
    arrow.className = "arrow";

    const text = document.createElement("span");
    text.textContent = "+" + diff;

    diffDiv.appendChild(arrow);
    diffDiv.appendChild(text);

  } else if (diff < 0) {
    diffDiv.classList.add("down");

    const arrow = document.createElement("span");
    arrow.className = "arrow";

    const text = document.createElement("span");
    text.textContent = diff;

    diffDiv.appendChild(arrow);
    diffDiv.appendChild(text);

  } else {
    diffDiv.classList.add("flat");
    diffDiv.textContent = "-- NO CHANGE";
  }

  td.appendChild(valueDiv);
  td.appendChild(diffDiv);

  return td;
}

/* TAB SWITCH */
function activateTab(id) {
  document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));

  document.getElementById(id)?.classList.add("active");

  document.querySelectorAll(".tab-btn").forEach(btn=>{
    if((id==="tab-main" && btn.textContent==="Main") || id.includes(btn.textContent)){
      btn.classList.add("active");
    }
  });
}
</script>

</body>
</html>
