<!DOCTYPE html>
<meta charset="UTF-8">
<html>
<meta charset="UTF-8">
<head>
  <title>Above Rank 5 Users Report</title>

  <style>
    body { font-family: Arial, sans-serif; }

    .tabs {
      margin-bottom: 10px;
    }

    .tab-btn {
      padding: 8px 14px;
      margin-right: 5px;
      border: 1px solid #aaa;
      background: #f2f2f2;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #dbeafe;
      font-weight: bold;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: small;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #aaa;
      padding: 6px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    tr.total {
      background-color: #dbeafe;
      font-weight: bold;
    }

    .loading {
      padding: 20px;
      font-size: 16px;
      font-weight: bold;
      color: #555;
    }
  </style>
</head>

<body>

<h2 class="rptname">Above Rank 5 Users Report</h2>

<div id="loading" class="loading">Loading report data...</div>

<div id="tabs" class="tabs" style="display:none;"></div>
<div id="tabContents"></div>

<script>
const baseUrl = "https://api.nftwall.io:2096/api/call-proc?procedureName=get_rpt_5Star_user";

let mainData = [];

/* ---------------- LOAD MAIN DATA ---------------- */
fetch(baseUrl)
  .then(res => res.json())
  .then(apiResponse => {
    document.getElementById("loading").style.display = "none";

    if (!apiResponse.success || !Array.isArray(apiResponse.data)) {
      console.error("Invalid API response", apiResponse);
      return;
    }

    mainData = apiResponse.data[0] || [];

    renderMainTab(mainData);
    createNodeTabs(mainData);
  })
  .catch(err => {
    document.getElementById("loading").textContent = "Failed to load data.";
    console.error(err);
  });

/* ---------------- RENDER MAIN TAB ---------------- */
function renderMainTab(data) {
  const tabsDiv = document.getElementById("tabs");
  const contentsDiv = document.getElementById("tabContents");

  tabsDiv.style.display = "block";

  const btn = document.createElement("button");
  btn.className = "tab-btn active";
  btn.textContent = "Main";
  btn.onclick = () => activateTab("tab-main");
  tabsDiv.appendChild(btn);

  const content = document.createElement("div");
  content.className = "tab-content active";
  content.id = "tab-main";

  content.appendChild(createTable(data));
  contentsDiv.appendChild(content);
}

/* ---------------- CREATE NODE TABS ---------------- */
function createNodeTabs(data) {
  const tabsDiv = document.getElementById("tabs");

  const nodes = [...new Set(data.map(x => x.node))];

  nodes.forEach(node => {
    const short = node.slice(0, 6) + "..." + node.slice(-4);

    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = short;

    btn.onclick = () => loadNodeHistory(node, short);

    tabsDiv.appendChild(btn);
  });
}

/* ---------------- LOAD NODE HISTORY ---------------- */
function loadNodeHistory(node, label) {
  const tabId = "tab-" + label;

  activateTab(tabId);

  if (document.getElementById(tabId)) return;

  const contentsDiv = document.getElementById("tabContents");

  const content = document.createElement("div");
  content.className = "tab-content";
  content.id = tabId;
  content.innerHTML = "<div class='loading'>Loading history...</div>";

  contentsDiv.appendChild(content);

  const url = baseUrl + `&node=${node}&days=5`;

  fetch(url)
    .then(res => res.json())
    .then(apiResponse => {
      if (!apiResponse.success) {
        content.innerHTML = "Failed to load data";
        return;
      }

      const data = apiResponse.data[0] || [];
      content.innerHTML = "";
      content.appendChild(createTable(data));
    })
    .catch(err => {
      content.innerHTML = "Error loading data";
      console.error(err);
    });
}

/* ---------------- TABLE ---------------- */
function createTable(dataset) {
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const tbody = document.createElement("tbody");

  if (!dataset.length) return table;

  const headers = [
    "nodeId",
    "node",
    "My Business",
    "Team Business",
    "MyQty",
    "TeamQty",
    "Directs",
    "TeamCount",
    "Date"
  ];

  const headerRow = document.createElement("tr");
  headers.forEach(h => {
    const th = document.createElement("th");
    th.textContent = h;
    headerRow.appendChild(th);
  });

  thead.appendChild(headerRow);

  dataset.forEach(row => {
    const tr = document.createElement("tr");

    addCell(tr, row.nodeId);
    addCell(tr, shortAddr(row.node));

    tr.appendChild(createTrendCell(row.mybusiness, row.mybusiness_diff));
    tr.appendChild(createTrendCell(row.teambusiness, row.teambusiness_diff));

    tr.appendChild(createTrendCell(row.myQty, row.myQty_diff));
    tr.appendChild(createTrendCell(row.teamQty, row.teamQty_diff));

    tr.appendChild(createTrendCell(row.directs, row.directs_diff));
    tr.appendChild(createTrendCell(row.teamcount, row.teamcount_diff));

    addCell(tr, row.date);

    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  return table;
}

/* ---------------- CELL HELPERS ---------------- */
function addCell(tr, value) {
  const td = document.createElement("td");
  td.textContent = value ?? "";
  tr.appendChild(td);
}

function shortAddr(addr) {
  if (!addr) return "";
  return addr.slice(0, 6) + "..." + addr.slice(-4);
}

/* ---------------- TREND CELL ---------------- */
function createTrendCell(value, diff) {
  const td = document.createElement("td");

  diff = Number(diff ?? 0);

  const main = document.createElement("div");
  main.textContent = Number(value || 0).toLocaleString();
  main.style.fontWeight = "600";

  const trend = document.createElement("div");

  if (diff > 0) {
    trend.innerHTML = `▲ +${diff}`;
    trend.style.color = "#16a34a";
  } else if (diff < 0) {
    trend.innerHTML = `▼ ${diff}`;
    trend.style.color = "#dc2626";
  } else {
    trend.innerHTML = `– 0`;
    trend.style.color = "#6b7280";
  }

  trend.style.fontSize = "11px";

  td.appendChild(main);
  td.appendChild(trend);

  return td;
}

/* ---------------- TAB SWITCH ---------------- */
function activateTab(id) {
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(div => div.classList.remove("active"));

  document.querySelectorAll(".tab-btn").forEach(btn => {
    if (id === "tab-main" && btn.textContent === "Main") {
      btn.classList.add("active");
    } else if (btn.textContent.includes(id.replace("tab-", ""))) {
      btn.classList.add("active");
    }
  });

  const tab = document.getElementById(id);
  if (tab) tab.classList.add("active");
}
</script>

</body>
</html>
