<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Above Rank 5 Users Report</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
}

/* Tabs */
.tabs {
  margin-bottom: 10px;
}

.tab-btn {
  padding: 6px 12px;
  margin-right: 5px;
  border: 1px solid #999;
  background: #f5f5f5;
  cursor: pointer;
}

.tab-btn.active {
  background: #e0e7ff;
  font-weight: bold;
}

/* Tab content control */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* Table */
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  margin-top: 10px;
}

th, td {
  border: 1px solid #cfcfcf;
  padding: 6px 8px;
  text-align: right;
}

th {
  background: #f0f0f0;
  text-align: center;
  font-weight: bold;
}

/* Left align first columns */
td:first-child,
td:nth-child(2) {
  text-align: left;
}

/* Zebra rows */
tr:nth-child(even) {
  background: #fafafa;
}

/* Hover */
tr:hover {
  background: #f1f5ff;
}

/* Trend styles */
.trend-up {
  background: #e6f9ec;
  color: #0f7a2f;
  font-weight: bold;
}

.trend-down {
  background: #fde8e8;
  color: #b91c1c;
  font-weight: bold;
}

.trend-flat {
  color: #666;
}

.value {
  display: block;
}

.diff {
  font-size: 11px;
}

/* Loading */
.loading {
  padding: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Above Rank 5 Users Report</h2>

<div id="loading" class="loading">Loading report data...</div>

<div id="tabs" class="tabs" style="display:none;"></div>
<div id="tabContents"></div>

<script>
const baseUrl = "https://api.nftwall.io:2096/api/call-proc?procedureName=get_rpt_5Star_user";

let mainData = [];

/* ---------------- LOAD MAIN DATA ---------------- */
fetch(baseUrl)
  .then(res => res.json())
  .then(apiResponse => {
    document.getElementById("loading").style.display = "none";

    if (!apiResponse.success || !Array.isArray(apiResponse.data)) {
      console.error("Invalid API response", apiResponse);
      return;
    }

    mainData = apiResponse.data[0] || [];

    renderMainTab(mainData);
    createNodeTabs(mainData);
  })
  .catch(err => {
    document.getElementById("loading").textContent = "Failed to load data.";
    console.error(err);
  });

/* ---------------- MAIN TAB ---------------- */
function renderMainTab(data) {
  const tabsDiv = document.getElementById("tabs");
  const contentsDiv = document.getElementById("tabContents");

  tabsDiv.style.display = "block";

  const btn = document.createElement("button");
  btn.className = "tab-btn active";
  btn.textContent = "Main";
  btn.onclick = () => activateTab("tab-main");
  tabsDiv.appendChild(btn);

  const content = document.createElement("div");
  content.className = "tab-content active";
  content.id = "tab-main";

  content.appendChild(createTable(data));
  contentsDiv.appendChild(content);
}

/* ---------------- NODE TABS ---------------- */
function createNodeTabs(data) {
  const tabsDiv = document.getElementById("tabs");

  const nodes = [...new Set(data.map(x => x.node))];

  nodes.forEach(node => {
    const short = node.slice(0, 6) + "..." + node.slice(-4);

    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = short;

    btn.onclick = () => loadNodeHistory(node, short);

    tabsDiv.appendChild(btn);
  });
}

/* ---------------- LOAD NODE HISTORY ---------------- */
function loadNodeHistory(node, label) {
  const tabId = "tab-" + label;
  const contentsDiv = document.getElementById("tabContents");

  let content = document.getElementById(tabId);

  // create tab if not exists
  if (!content) {
    content = document.createElement("div");
    content.className = "tab-content";
    content.id = tabId;

    content.innerHTML = "<div class='loading'>Loading history...</div>";
    contentsDiv.appendChild(content);
  }

  // activate tab AFTER creating it
  activateTab(tabId);

  // prevent re-fetch
  if (content.dataset.loaded) return;

  const url = baseUrl + `&node=${node}&days=5`;

  fetch(url)
    .then(res => res.json())
    .then(apiResponse => {
      if (!apiResponse.success) {
        content.innerHTML = "Failed to load data";
        return;
      }

      const data = apiResponse.data[0] || [];
      content.innerHTML = "";
      content.appendChild(createTable(data));

      content.dataset.loaded = "true";
    })
    .catch(err => {
      content.innerHTML = "Error loading data";
      console.error(err);
    });
}

/* ---------------- TABLE ---------------- */
function createTable(dataset) {
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const tbody = document.createElement("tbody");

  if (!dataset.length) return table;

  const headers = [
    "nodeId",
    "node",
    "My Business",
    "Team Business",
    "MyQty",
    "TeamQty",
    "Directs",
    "TeamCount",
    "Date"
  ];

  const headerRow = document.createElement("tr");
  headers.forEach(h => {
    const th = document.createElement("th");
    th.textContent = h;
    headerRow.appendChild(th);
  });

  thead.appendChild(headerRow);

  dataset.forEach(row => {
    const tr = document.createElement("tr");

    addCell(tr, row.nodeId);
    addCell(tr, shortAddr(row.node));

    tr.appendChild(createTrendCell(row.mybusiness, row.mybusiness_diff));
    tr.appendChild(createTrendCell(row.teambusiness, row.teambusiness_diff));

    tr.appendChild(createTrendCell(row.myQty, row.myQty_diff));
    tr.appendChild(createTrendCell(row.teamQty, row.teamQty_diff));

    tr.appendChild(createTrendCell(row.directs, row.directs_diff));
    tr.appendChild(createTrendCell(row.teamcount, row.teamcount_diff));

    addCell(tr, row.date);

    tbody.appendChild(tr);
  });

  table.appendChild(thead);
  table.appendChild(tbody);
  return table;
}

/* ---------------- HELPERS ---------------- */
function addCell(tr, value) {
  const td = document.createElement("td");
  td.textContent = value ?? "";
  tr.appendChild(td);
}

function shortAddr(addr) {
  if (!addr) return "";
  return addr.slice(0, 6) + "..." + addr.slice(-4);
}

/* ---------------- TREND CELL ---------------- */
function createTrendCell(value, diff) {
  const td = document.createElement("td");

  diff = Number(diff ?? 0);
  const val = Number(value || 0);

  const valueDiv = document.createElement("span");
  valueDiv.className = "value";
  valueDiv.textContent = val.toLocaleString();

  const diffDiv = document.createElement("span");
  diffDiv.className = "diff";

  if (diff > 0) {
    td.classList.add("trend-up");
    diffDiv.textContent = `▲ UP +${diff}`;
  } else if (diff < 0) {
    td.classList.add("trend-down");
    diffDiv.textContent = `▼ DOWN ${diff}`;
  } else {
    td.classList.add("trend-flat");
    diffDiv.textContent = `— NO CHANGE`;
  }

  td.appendChild(valueDiv);
  td.appendChild(diffDiv);

  return td;
}

/* ---------------- TAB SWITCH ---------------- */
function activateTab(id) {
  document.querySelectorAll(".tab-content").forEach(div => {
    div.classList.remove("active");
  });

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  const tab = document.getElementById(id);
  if (tab) tab.classList.add("active");

  document.querySelectorAll(".tab-btn").forEach(btn => {
    if (
      (id === "tab-main" && btn.textContent === "Main") ||
      id.includes(btn.textContent)
    ) {
      btn.classList.add("active");
    }
  });
}
</script>

</body>
</html>
