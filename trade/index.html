<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SecureTrade · Crypto Trading API Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg: radial-gradient(circle at top, #0f1a2b, #05070f);
  --card: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.12);
  --border: rgba(255,255,255,0.18);
  --accent: #3fa9ff;
  --accent2: #00ffd5;
  --danger: #ff5f5f;
  --text: #e8ecff;
  --green: #00ff90;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  color: var(--text);
}

/* 📱 Phone-like frame */
.phone {
  width: 420px;
  max-width: 94vw;
  border-radius: 28px;
  padding: 14px;
  background: linear-gradient(180deg, #111, #000);
  box-shadow: 0 40px 80px rgba(0,0,0,.8);
}

/* Glass trading panel */
.container, .createBotContainer {
  background: var(--card);
  border-radius: 22px;
  padding: 22px;
  backdrop-filter: blur(18px);
  border: 1px solid var(--border);
  box-shadow:
    0 30px 60px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.1);
  transform-style: preserve-3d;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.header h2 {
  margin: 0;
  font-size: 18px;
  letter-spacing: .8px;
  color: var(--accent2);
}

/* Fake trading status LED */
.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  opacity: .8;
}
.status::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}

/* Inputs */
.section {
  margin-bottom: 14px;

  .otp-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .otp-row input {
    flex: 1;
    margin-top: 8px;
  }

  .otp-row button {
    margin-top: 8px;
    white-space: nowrap;
  }
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.45);
  color: var(--text);
  outline: none;
  transition: .25s;
}

input::placeholder {
  color: rgba(255,255,255,.45);
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(63,169,255,.25);
}

/* Button grids */
.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

button {
  padding: 12px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  color: #020617;
  background: linear-gradient(145deg, var(--accent), var(--accent2));
  box-shadow:
    0 8px 18px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.4);
  transition: transform .15s ease, box-shadow .15s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow:
    0 14px 28px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.5);
}

button:active {
  transform: translateY(1px);
}

button.danger {
  background: linear-gradient(145deg, #ff4d4d, #ff9a9a);
}

/* Trading console output */
pre {
  margin-top: 12px;
  padding: 14px;
  background: #03050b;
  border-radius: 16px;
  color: var(--green);
  max-height: 260px;
  overflow-y: auto;
  font-size: 12.5px;
  line-height: 1.4;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}

/* Footer */
.footer {
  text-align: center;
  font-size: 11px;
  opacity: .6;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="phone">
  <div class="container" id="apiContainer">

    <div class="header">
      <h2>SecureTrade · API Console</h2>
      <div class="status">LIVE</div>
    </div>

    <div class="section">
      <input id="username" placeholder="username" value="shishirsaxena26">
      <input id="useremail" placeholder="email" value="shishir.sna99@gmail.com">
      <input id="password" type="password" placeholder="Password" value="password@#@123">
    </div>

    <div class="buttons">
      <button onclick="signup()">Signup</button>
      <button id="btnLogin" onclick="login()">Login</button>
      <button id="btnLogout" class="danger" onclick="logout()">Logout</button>
      <button onclick="dashboard()">Dashboard</button>
    </div>

    <div class="section">

      <div class="otp-row">
        <input id="otp" placeholder="Enter OTP">
        <button onclick="sendOTP()">Send OTP</button>
      </div>

      <input id="apikey" placeholder="Binance API Key">
      <input id="secretkey" placeholder="Binance Secret Key">

    </div>

    <div class="buttons">
      <button onclick="getKeys()">Get Keys</button>
      
      <button onclick="apiBind()">API Bind</button>
      <button onclick="toggleContainer(2)">CREATE BOT</button>
      <button onclick="showtablehtml()">Tables</button>
    </div>
  </div>

  <div class="container" id="botContainer" style="display: none;">

  <div class="header">
    <h2>Create / Update BOT</h2>
    <button onclick="toggleContainer(1)">Back</button>
  </div>

  <div class="section">
    <h3>General Settings</h3>
    <input id="mode" placeholder="Mode (HYBRID/SPOT/FUTURES)" value="HYBRID">
    <input id="symbols" placeholder="Symbols (e.g., BTC/USDT)" value="BTC/USDT">
  </div>

  <div class="section">
    <h3>Spot Config</h3>
    <input id="initialBuyPercent" placeholder="Initial Buy Percent (0-1)" value="0.10">
    <input id="maxDcaCount" placeholder="Max DCA Count" value="4">
    <input id="takeProfitPercent" placeholder="Take Profit Percent (0-1)" value="0.015">
    <input id="trailingStopPercent" placeholder="Trailing Stop Percent (0-1)" value="0.007">
    <input id="rsiEntry" placeholder="RSI Entry" value="40">
    <input id="rsiDca" placeholder="RSI DCA" value="36">
    <label>
      <input type="checkbox" id="useEmaFilter" checked> Use EMA Filter
    </label>

    <h4>DCA Levels</h4>
    <div id="dcaLevels">
      <div class="dca-row">
        <input placeholder="Price Drop" class="priceDrop" value="-0.02">
        <input placeholder="Capital Percent" class="capitalPercent" value="0.10">
      </div>
      <div class="dca-row">
        <input placeholder="Price Drop" class="priceDrop" value="-0.04">
        <input placeholder="Capital Percent" class="capitalPercent" value="0.12">
      </div>
      <div class="dca-row">
        <input placeholder="Price Drop" class="priceDrop" value="-0.07">
        <input placeholder="Capital Percent" class="capitalPercent" value="0.15">
      </div>
      <div class="dca-row">
        <input placeholder="Price Drop" class="priceDrop" value="-0.10">
        <input placeholder="Capital Percent" class="capitalPercent" value="0.18">
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Futures Config</h3>
    <input id="riskPerTrade" placeholder="Risk Per Trade (0-1)" value="0.015">
    <input id="leverage" placeholder="Leverage" value="3">
    <input id="atrMultiplier" placeholder="ATR Multiplier" value="2">
  </div>

  <div class="buttons">
    <button onclick="saveSettings()">Save Settings</button>
  </div>

  <div class="footer">SecureTrade · Crypto Trading Terminal</div>

  </div>

   <!-- Always visible output console -->
  <pre id="output">// Trading API responses</pre>
  <div class="footer">SecureTrade · Crypto Trading Terminal</div>
</div>

<script>
document.getElementById("btnLogout").style.display = "none";
const BASE_URL = "https://gateway.stbots.io";
let TOKEN = "";

// Safe response handler
async function handleResponse(res) {
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    return { error: text, status: res.status };
  }
}

function show(data) {
  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}

function authHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + TOKEN
  };
}

// ================= SIGNUP =================
async function signup() {
  const res = await fetch(BASE_URL + "/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: username.value.trim(),
      useremail: useremail.value.trim(),   // backend expects this
      password: password.value
    })
  });

  show(await handleResponse(res));
}

// ================= LOGIN =================
async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: username.value.trim(),
      password: password.value
    })
  });

  const data = await handleResponse(res);

  if (data.token) {
    document.getElementById("btnLogin").style.display = "none";
    document.getElementById("btnLogout").style.display = "block";
    TOKEN = data.token;
  }

  show(data);
}

// ================= DASHBOARD =================
async function dashboard() {
  if (!TOKEN) return show({ error: "Login required" });

  const res = await fetch(BASE_URL + "/dashboard", {
    method: "POST",
    headers: authHeaders()
  });

  show(await handleResponse(res));
}

// ================= SEND OTP =================
async function sendOTP() {
  if (!TOKEN) return show({ error: "Login required" });

  const res = await fetch(BASE_URL + "/sendotp", {
    method: "POST",
    headers: authHeaders()
  });

  show(await handleResponse(res));
}

// ================= API BIND =================
async function apiBind() {
  if (!TOKEN) return show({ error: "Login required" });

  const res = await fetch(BASE_URL + "/apibind", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({
      apikey: apikey.value.trim(),
      secretkey: secretkey.value.trim(),
      keyotp: otp.value.trim()
    })
  });

  show(await handleResponse(res));
}

// ================= GET KEYS =================
async function getKeys() {
  if (!TOKEN) return show({ error: "Login required" });

  const res = await fetch(BASE_URL + "/getapikeys", {
    method: "POST",
    headers: authHeaders()
  });

  show(await handleResponse(res));
}

// ================= LOGOUT =================
async function logout() {
  document.getElementById("btnLogin").style.display = "block";
  document.getElementById("btnLogout").style.display = "none";
  if (!TOKEN) return show({ error: "Already logged out" });

  const res = await fetch(BASE_URL + "/logout", {
    method: "POST",
    headers: authHeaders()
  });

  TOKEN = "";

  show(await handleResponse(res));
}



async function toggleContainer(type) {
  if(type==1) {
    document.getElementById("apiContainer").style.display = "block";
    document.getElementById("botContainer").style.display = "none";
  }

  if(type==2) {
    document.getElementById("apiContainer").style.display = "none";
    document.getElementById("botContainer").style.display = "block";
  }
}

// ================= BOT STATUS =================
function showbothtml() {
  const userId = username.value.trim();
  window.open(`/trade/bot.html?userid=${encodeURIComponent(userId)}`, "_self");
}

// ================= BOT STATUS =================
function showtablehtml() {
  const userId = username.value.trim();
  window.open(`/trade/data.html`, "_blank");
}
</script>


<script>
async function saveSettings() {
  const dcaRows = document.querySelectorAll("#dcaLevels .dca-row");
  const dcaLevels = Array.from(dcaRows).map(row => ({
    priceDrop: parseFloat(row.querySelector(".priceDrop").value),
    capitalPercent: parseFloat(row.querySelector(".capitalPercent").value)
  }));

  const payload = {
    mode: document.getElementById("mode").value,
    pair: document.getElementById("symbols").value,
    spotConfig: {
      initialBuyPercent: parseFloat(document.getElementById("initialBuyPercent").value),
      maxDcaCount: parseInt(document.getElementById("maxDcaCount").value),
      takeProfitPercent: parseFloat(document.getElementById("takeProfitPercent").value),
      trailingStopPercent: parseFloat(document.getElementById("trailingStopPercent").value),
      rsiEntry: parseInt(document.getElementById("rsiEntry").value),
      rsiDca: parseInt(document.getElementById("rsiDca").value),
      useEmaFilter: document.getElementById("useEmaFilter").checked,
      dcaLevels
    },
    futuresConfig: {
      riskPerTrade: parseFloat(document.getElementById("riskPerTrade").value),
      leverage: parseInt(document.getElementById("leverage").value),
      atrMultiplier: parseFloat(document.getElementById("atrMultiplier").value)
    }
  };

  const res = await fetch(BASE_URL + "/savesettings", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify(payload)
  });

  const data = await handleResponse(res);
  show(data); // reuse existing function to show response
}
</script>

</body>
</html>
