<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OzoneChain AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: linear-gradient(135deg, #dbeafe, #ede9fe, #fdf2f8);
  --user: linear-gradient(135deg, #6366f1, #4f46e5);
  --ai: rgba(255,255,255,0.85);
  --border: rgba(0,0,0,0.08);
  --text: #0f172a;
  --muted: #64748b;
}

/* ---------- BODY ---------- */
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  background-size: 200% 200%;
  animation: bgMove 12s ease infinite;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
}

@keyframes bgMove {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

/* ---------- APP ---------- */
.app {
  width:100%;
  max-width:900px;
  height:92vh;

  display:flex;
  flex-direction:column;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);

  border-radius:18px;
  overflow:hidden;

  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

/* ---------- HEADER ---------- */
.header {
  padding:18px;
  font-weight:600;
  border-bottom:1px solid var(--border);
}

/* ---------- CHAT ---------- */
.chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* ---------- MESSAGE ---------- */
.msgWrap {
  max-width:75%;
  display:flex;
  flex-direction:column;
}

.msgWrap.user {
  align-self:flex-end;
}

.msgWrap.ai {
  align-self:flex-start;
}

/* label row */
.labelRow {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
  width:100%;
}

.label {
  font-size:11px;
  color: var(--muted);
  font-weight:600;
}

/* bubble */
.msg {
  padding:14px 16px;
  border-radius:14px;
  font-size:14px;
  line-height:1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

/* user */
.msg.user {
  background: var(--user);
  color:#fff;
  border-bottom-right-radius:4px;
}

/* AI */
.msg.ai {
  background: var(--ai);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}

/* ---------- COPY BUTTON ---------- */
.copyBtn {
  font-size:11px;
  padding:4px 10px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  background:#e2e8f0;
  transition:0.2s;
}

.copyBtn:hover {
  background:#c7d2fe;
}

/* ---------- INPUT ---------- */
.inputBar {
  display:flex;
  gap:10px;
  padding:14px;
  border-top:1px solid var(--border);
  background: rgba(255,255,255,0.7);
}

.inputBar input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  outline:none;
}

.inputBar button {
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.inputBar button:disabled {
  opacity:0.6;
}

/* ---------- CURSOR ---------- */
.cursor {
  display:inline-block;
  width:5px;
  height:1em;
  background:#4f46e5;
  margin-left:2px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0; }
}

/* ---------- SCROLL ---------- */
.chat::-webkit-scrollbar {
  width:5px;
}
.chat::-webkit-scrollbar-thumb {
  background:#c7d2fe;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">OzoneChain AI Assistant</div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <input id="textInput" placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') send()" />
    <button id="btnSend" onclick="send()">Send</button>
  </div>

</div>

<script>
const URL = "http://localhost:3000";

function addMessage(text, type) {
  const wrap = document.createElement("div");
  wrap.className = "msgWrap " + type;

  // label row
  const labelRow = document.createElement("div");
  labelRow.className = "labelRow";

  const label = document.createElement("div");
  label.className = "label";
  label.innerText = type === "user" ? "You" : "AI";

  labelRow.appendChild(label);

  let content;

  if (type === "ai") {
    const copyBtn = document.createElement("button");
    copyBtn.className = "copyBtn";
    copyBtn.innerText = "Copy";

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(content.innerText);
      copyBtn.innerText = "✓";
      setTimeout(() => copyBtn.innerText = "Copy", 1000);
    };

    labelRow.appendChild(copyBtn);
  }

  const msg = document.createElement("div");
  msg.className = "msg " + type;

  content = document.createElement("div");
  content.innerText = text;

  msg.appendChild(content);

  wrap.appendChild(labelRow);
  wrap.appendChild(msg);

  document.getElementById("chat").appendChild(wrap);

  return content;
}

function scrollBottom(){
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function showLoader(){
  document.getElementById("btnSend").disabled = true;
}

function hideLoader(){
  document.getElementById("btnSend").disabled = false;
}

async function send(){
  const input = document.getElementById("textInput").value;
  if(!input) return;

  showLoader();

  addMessage(input, "user");
  const aiMsg = addMessage("", "ai");

  document.getElementById("textInput").value = "";

  try {
    const res = await fetch(URL + '/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: input })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let fullText = "";

    while(true){
      const {done, value} = await reader.read();
      if(done) break;

      fullText += decoder.decode(value);
      aiMsg.innerHTML = fullText + '<span class="cursor"></span>';
      scrollBottom();
    }

    aiMsg.innerText = fullText;

  } catch(err){
    aiMsg.innerText = "Error loading response";
  }

  hideLoader();
}
</script>

</body>
</html>
